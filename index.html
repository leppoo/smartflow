<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartFlow Invoice</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:  'rgb(var(--color-primary-50) / <alpha-value>)',
              100: 'rgb(var(--color-primary-100) / <alpha-value>)',
              200: 'rgb(var(--color-primary-200) / <alpha-value>)',
              300: 'rgb(var(--color-primary-300) / <alpha-value>)',
              400: 'rgb(var(--color-primary-400) / <alpha-value>)',
              500: 'rgb(var(--color-primary-500) / <alpha-value>)',
              600: 'rgb(var(--color-primary-600) / <alpha-value>)',
              700: 'rgb(var(--color-primary-700) / <alpha-value>)',
              800: 'rgb(var(--color-primary-800) / <alpha-value>)',
              900: 'rgb(var(--color-primary-900) / <alpha-value>)',
            },
            accent: {
              50:  'rgb(var(--color-accent-50) / <alpha-value>)',
              100: 'rgb(var(--color-accent-100) / <alpha-value>)',
              200: 'rgb(var(--color-accent-200) / <alpha-value>)',
              300: 'rgb(var(--color-accent-300) / <alpha-value>)',
              400: 'rgb(var(--color-accent-400) / <alpha-value>)',
              500: 'rgb(var(--color-accent-500) / <alpha-value>)',
              600: 'rgb(var(--color-accent-600) / <alpha-value>)',
              700: 'rgb(var(--color-accent-700) / <alpha-value>)',
              800: 'rgb(var(--color-accent-800) / <alpha-value>)',
              900: 'rgb(var(--color-accent-900) / <alpha-value>)',
            },
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* Default theme CSS variables (Indigo + Violet) */
    :root {
      --color-primary-50: 238 242 255;
      --color-primary-100: 224 231 255;
      --color-primary-200: 199 210 254;
      --color-primary-300: 165 180 252;
      --color-primary-400: 129 140 248;
      --color-primary-500: 99 102 241;
      --color-primary-600: 79 70 229;
      --color-primary-700: 67 56 202;
      --color-primary-800: 55 48 163;
      --color-primary-900: 49 46 129;
      --color-accent-50: 245 243 255;
      --color-accent-100: 237 233 254;
      --color-accent-200: 221 214 254;
      --color-accent-300: 196 181 253;
      --color-accent-400: 167 139 250;
      --color-accent-500: 139 92 246;
      --color-accent-600: 124 58 237;
      --color-accent-700: 109 40 217;
      --color-accent-800: 91 33 182;
      --color-accent-900: 76 29 149;
    }

    body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }

    /* Screen Styles */
    .invoice-container {
      background: white;
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
      padding: 15mm;
    }

    /* Print Styles */
    @media print {
      /* Freeze theme to Default for consistent printed invoices */
      :root {
        --color-primary-50: 238 242 255 !important;
        --color-primary-100: 224 231 255 !important;
        --color-primary-200: 199 210 254 !important;
        --color-primary-300: 165 180 252 !important;
        --color-primary-400: 129 140 248 !important;
        --color-primary-500: 99 102 241 !important;
        --color-primary-600: 79 70 229 !important;
        --color-primary-700: 67 56 202 !important;
        --color-primary-800: 55 48 163 !important;
        --color-primary-900: 49 46 129 !important;
        --color-accent-50: 245 243 255 !important;
        --color-accent-100: 237 233 254 !important;
        --color-accent-200: 221 214 254 !important;
        --color-accent-300: 196 181 253 !important;
        --color-accent-400: 167 139 250 !important;
        --color-accent-500: 139 92 246 !important;
        --color-accent-600: 124 58 237 !important;
        --color-accent-700: 109 40 217 !important;
        --color-accent-800: 91 33 182 !important;
        --color-accent-900: 76 29 149 !important;
      }
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      @page {
        margin: 0;
        size: A4 portrait;
      }
      body {
        background: white !important;
        background-image: none !important;
        margin: 0;
        padding: 0;
      }
      .no-print {
        display: none !important;
      }
      .invoice-container {
        width: 210mm !important;
        height: 296mm !important; /* Slightly less to avoid extra blank page */
        margin: 0 !important;
        padding: 15mm !important;
        box-shadow: none !important;
        border: none !important;
        page-break-after: always;
      }
      #root, main, .container {
        width: 100% !important;
        max-width: none !important;
        margin: 0 !important;
        padding: 0 !important;
      }
    }

    /* Mobile handling for preview */
    @media (max-width: 210mm) {
      .invoice-container {
        width: 100%;
        min-height: auto;
        padding: 1rem;
        box-shadow: none;
      }
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",

<!-- Apply saved theme before React mounts to prevent flash -->
<script>
  (function() {
    var THEMES = {
      'default': { 'primary-50':'238 242 255','primary-100':'224 231 255','primary-200':'199 210 254','primary-300':'165 180 252','primary-400':'129 140 248','primary-500':'99 102 241','primary-600':'79 70 229','primary-700':'67 56 202','primary-800':'55 48 163','primary-900':'49 46 129','accent-50':'245 243 255','accent-100':'237 233 254','accent-200':'221 214 254','accent-300':'196 181 253','accent-400':'167 139 250','accent-500':'139 92 246','accent-600':'124 58 237','accent-700':'109 40 217','accent-800':'91 33 182','accent-900':'76 29 149' },
      'milk-coffee': { 'primary-50':'250 250 250','primary-100':'245 245 245','primary-200':'229 229 229','primary-300':'212 212 212','primary-400':'163 163 163','primary-500':'115 115 115','primary-600':'82 82 82','primary-700':'64 64 64','primary-800':'38 38 38','primary-900':'23 23 23','accent-50':'252 251 247','accent-100':'248 245 236','accent-200':'243 239 224','accent-300':'228 220 196','accent-400':'206 194 162','accent-500':'180 165 128','accent-600':'152 136 98','accent-700':'122 108 74','accent-800':'96 82 54','accent-900':'72 60 36' },
      'woody': { 'primary-50':'252 246 245','primary-100':'247 233 232','primary-200':'238 208 205','primary-300':'222 174 170','primary-400':'198 134 128','primary-500':'162 90 84','primary-600':'118 56 50','primary-700':'82 42 39','primary-800':'60 28 25','primary-900':'42 18 16','accent-50':'244 251 243','accent-100':'232 246 230','accent-200':'210 238 206','accent-300':'182 225 176','accent-400':'166 212 159','accent-500':'130 185 122','accent-600':'98 158 90','accent-700':'72 126 65','accent-800':'52 98 46','accent-900':'36 72 30' },
      'chiffon': { 'primary-50':'254 242 240','primary-100':'253 226 222','primary-200':'250 198 190','primary-300':'245 164 154','primary-400':'241 135 122','primary-500':'237 106 90','primary-600':'214 80 65','primary-700':'178 60 46','primary-800':'142 44 32','primary-900':'108 30 20','accent-50':'254 254 248','accent-100':'252 251 238','accent-200':'249 247 221','accent-300':'244 241 187','accent-400':'230 225 148','accent-500':'208 201 108','accent-600':'176 168 78','accent-700':'142 134 56','accent-800':'108 100 38','accent-900':'76 70 22' }
    };
    var saved = localStorage.getItem('smartflow_theme');
    if (saved && THEMES[saved]) {
      var colors = THEMES[saved];
      var root = document.documentElement;
      for (var key in colors) {
        root.style.setProperty('--color-' + key, colors[key]);
      }
    }
  })();
</script>
<!-- Apply saved wallpaper before React mounts to prevent flash -->
<script>
  (function() {
    var saved = localStorage.getItem('smartflow_wallpaper');
    if (saved === 'custom') {
      var custom = localStorage.getItem('smartflow_wallpaper_custom');
      if (custom) {
        document.addEventListener('DOMContentLoaded', function() {
          document.body.style.background = 'url(' + custom + ') center/cover fixed no-repeat';
        });
      }
    } else if (saved === 'accent') {
      var rgb = getComputedStyle(document.documentElement).getPropertyValue('--color-accent-100').trim();
      if (rgb) {
        document.addEventListener('DOMContentLoaded', function() {
          document.body.style.background = 'rgb(' + rgb + ')';
        });
      }
    }
  })();
</script>
</head>
<body class="bg-[#F8F9FB] text-[#1F2937]">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
